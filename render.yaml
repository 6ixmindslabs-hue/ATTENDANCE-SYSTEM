services:
  - type: web
    name: attendance-system-api
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SUPABASE_DATABASE_URL
        sync: false
      - key: DATABASE_SSLMODE
        value: require
      - key: DATABASE_CONNECT_TIMEOUT
        value: "5"
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: APP_TIMEZONE
        value: Asia/Kolkata
      - key: FACE_RECOGNITION_THRESHOLD
        value: "0.40"
      - key: FACE_RECOGNITION_MIN_MARGIN
        value: "0.03"
      - key: INSIGHTFACE_MODEL_NAME
        value: buffalo_l
      - key: INSIGHTFACE_DET_SIZE
        value: "320"
      - key: PRELOAD_FACE_RECOGNITION
        value: "false"
      - key: FRONTEND_ORIGINS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
